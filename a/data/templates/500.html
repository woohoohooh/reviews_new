{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Что-то пошло не так</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle, #f8d7da, #f5c6cb); /* Лёгкий градиент ошибки */
            color: #721c24;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .error-container {
            max-width: 700px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            position: relative;
        }
        .error-container:before {
            content: "!";
            font-size: 140px;
            color: rgba(0, 0, 0, 0.07);
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }
        .error-title {
            font-size: 32px;
            color: #721c24;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .error-message {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }
        .error-quote {
            font-size: 18px;
            color: #721c24;
            margin-bottom: 30px;
            font-style: italic;
        }
        .home-button {
            display: inline-block;
            padding: 12px 24px;
            font-size: 16px;
            color: #fff;
            background-color: #c0392b; /* Насыщенный красный */
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
        }
        .home-button:hover {
            background-color: #96281b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-title">500 — Что-то пошло не так</h1>
        <p class="error-message">Вы попали туда, где страницы не существует. Может, попробуете оставить отзыв?</p>
        <p class="error-quote">"Позитивные отзывы лучше негативных, с этим не поспоришь!"</p>
        <a href="/" class="home-button">На главную страницу</a>
    </div>
</body>
</html>
